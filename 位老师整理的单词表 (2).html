<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PET词汇闪卡 - 完整版</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background-color: #f0f9ff;
            color: #0c4a6e;
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #38bdf8;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #0369a1;
        }
        
        .subtitle {
            font-size: 1.2rem;
            color: #0284c7;
            margin-bottom: 20px;
        }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .stat-box {
            background-color: #e0f2fe;
            padding: 10px 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            font-weight: bold;
        }
        
        .card-container {
            perspective: 1000px;
            margin: 30px auto;
            width: 100%;
            height: 380px;
            max-width: 550px;
        }
        
        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(3, 105, 161, 0.15);
            cursor: pointer;
        }
        
        .card.flipped {
            transform: rotateY(180deg);
        }
        
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        
        .card-front {
            background: linear-gradient(135deg, #7dd3fc 0%, #38bdf8 100%);
            color: #0c4a6e;
        }
        
        .card-back {
            background: linear-gradient(135deg, #bae6fd 0%, #7dd3fc 100%);
            color: #0c4a6e;
            transform: rotateY(180deg);
            overflow-y: auto;
        }
        
        .word {
            font-size: 2.5rem;
            margin-bottom: 15px;
            font-weight: bold;
            word-break: break-word;
            max-width: 100%;
        }
        
        .phonetic {
            font-size: 1.3rem;
            color: #0369a1;
            margin-bottom: 10px;
            font-family: 'Arial', sans-serif;
            background-color: rgba(255, 255, 255, 0.6);
            padding: 5px 15px;
            border-radius: 10px;
        }
        
        .meaning {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #0369a1;
        }
        
        .example {
            font-size: 1.1rem;
            font-style: italic;
            margin-top: 20px;
            padding: 15px;
            background-color: rgba(255, 255, 255, 0.7);
            border-radius: 10px;
            width: 100%;
        }
        
        .example-en {
            margin-bottom: 10px;
        }
        
        .example-cn {
            color: #475569;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 25px;
            background-color: #0ea5e9;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            box-shadow: 0 4px 8px rgba(14, 165, 233, 0.3);
        }
        
        .btn:hover {
            background-color: #0284c7;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(14, 165, 233, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn-small {
            padding: 8px 15px;
            font-size: 0.9rem;
        }
        
        .favorite-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 1.8rem;
            color: #f43f5e;
            cursor: pointer;
            transition: transform 0.3s;
            z-index: 10;
        }
        
        .favorite-btn:hover {
            transform: scale(1.2);
        }
        
        .favorite-btn.active {
            color: #e11d48;
        }
        
        .pronounce-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: none;
            border: none;
            font-size: 1.8rem;
            color: #0c4a6e;
            cursor: pointer;
            z-index: 10;
        }
        
        .pronounce-btn:hover {
            color: #0369a1;
        }
        
        .card-number {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 1rem;
            color: #0c4a6e;
        }
        
        /* 模态框样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .modal-content {
            background-color: #f0f9ff;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 700px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #38bdf8;
        }
        
        .modal-title {
            font-size: 1.8rem;
            color: #0369a1;
        }
        
        .close-modal {
            background: none;
            border: none;
            font-size: 1.8rem;
            color: #0369a1;
            cursor: pointer;
        }
        
        .favorites-list {
            list-style-type: none;
        }
        
        .favorite-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            background-color: #e0f2fe;
            border-radius: 10px;
            transition: background-color 0.3s;
        }
        
        .favorite-item:hover {
            background-color: #bae6fd;
        }
        
        .favorite-word {
            font-weight: bold;
            font-size: 1.3rem;
            color: #0369a1;
        }
        
        .favorite-meaning {
            color: #0c4a6e;
            margin-top: 5px;
        }
        
        .remove-btn {
            background-color: #f43f5e;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 5px 10px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .remove-btn:hover {
            background-color: #e11d48;
        }
        
        .search-box {
            margin: 20px 0;
            text-align: center;
        }
        
        .search-input {
            padding: 10px 20px;
            width: 100%;
            max-width: 400px;
            border: 2px solid #38bdf8;
            border-radius: 50px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .search-input:focus {
            border-color: #0369a1;
        }
        
        .category-filter {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        
        .category-btn {
            padding: 8px 15px;
            background-color: #e0f2fe;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .category-btn:hover {
            background-color: #bae6fd;
        }
        
        .category-btn.active {
            background-color: #0ea5e9;
            color: white;
        }
        
        @media (max-width: 768px) {
            .card-container {
                height: 350px;
            }
            
            .word {
                font-size: 2rem;
            }
            
            .meaning {
                font-size: 1.8rem;
            }
            
            .example {
                font-size: 1rem;
            }
            
            .btn {
                padding: 10px 20px;
                font-size: 1rem;
            }
            
            .controls {
                gap: 10px;
            }
            
            h1 {
                font-size: 2rem;
            }
        }
        
        @media (max-width: 480px) {
            .card-container {
                height: 320px;
            }
            
            .word {
                font-size: 1.6rem;
            }
            
            .meaning {
                font-size: 1.5rem;
            }
            
            .subtitle {
                font-size: 1rem;
            }
        }
        
        .instructions {
            text-align: center;
            margin-top: 20px;
            color: #475569;
            font-size: 0.9rem;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #e0f2fe;
            border-radius: 4px;
            margin: 15px 0;
            overflow: hidden;
        }
        
        .progress {
            height: 100%;
            background-color: #0ea5e9;
            border-radius: 4px;
            transition: width 0.3s;
        }
        
        .source {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 0.8rem;
            color: #475569;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 3px 10px;
            border-radius: 10px;
        }
        
        .ipa-note {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 5px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>PET词汇闪卡</h1>
            <p class="subtitle">包含200+个PET考试核心词汇，点击卡片翻转，点击喇叭图标发音</p>
            <div class="stats">
                <div class="stat-box">
                    <span id="current-card">1</span> / <span id="total-cards">0</span>
                </div>
                <div class="stat-box">
                    已收藏: <span id="favorites-count">0</span>
                </div>
                <div class="stat-box">
                    进度: <span id="progress-percent">0%</span>
                </div>
                <div class="stat-box">
                    <button class="btn btn-small" id="view-favorites-btn">
                        <i class="fas fa-bookmark"></i> 生词本
                    </button>
                </div>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progress-bar"></div>
            </div>
            <div class="search-box">
                <input type="text" class="search-input" id="search-input" placeholder="搜索单词或短语...">
            </div>
            <div class="category-filter">
                <button class="category-btn active" data-category="all">全部</button>
                <button class="category-btn" data-category="noun">名词</button>
                <button class="category-btn" data-category="verb">动词</button>
                <button class="category-btn" data-category="adj">形容词</button>
                <button class="category-btn" data-category="adv">副词</button>
                <button class="category-btn" data-category="phrase">短语</button>
                <button class="category-btn" data-category="sentence">句子</button>
            </div>
        </header>
        
        <div class="card-container">
            <div class="card" id="flashcard">
                <button class="favorite-btn" id="favorite-btn">
                    <i class="far fa-heart"></i>
                </button>
                <button class="pronounce-btn" id="pronounce-btn">
                    <i class="fas fa-volume-up"></i>
                </button>
                <div class="card-front">
                    <div class="word" id="word-front">Loading...</div>
                    <div class="phonetic" id="phonetic"></div>
                    <p>点击卡片查看中文释义</p>
                </div>
                <div class="card-back">
                    <div class="meaning" id="meaning-back">释义</div>
                    <div class="example" id="example-back">
                        <div class="example-en" id="example-en">例句英文</div>
                        <div class="example-cn" id="example-cn">例句中文</div>
                    </div>
                    <div class="source" id="source"></div>
                </div>
                <div class="card-number" id="card-number">1/0</div>
            </div>
        </div>
        
        <div class="controls">
            <button class="btn" id="prev-btn">
                <i class="fas fa-arrow-left"></i> 上一个
            </button>
            <button class="btn" id="flip-btn">
                <i class="fas fa-sync-alt"></i> 翻转
            </button>
            <button class="btn" id="next-btn">
                下一个 <i class="fas fa-arrow-right"></i>
            </button>
            <button class="btn" id="random-btn">
                <i class="fas fa-random"></i> 随机
            </button>
            <button class="btn" id="shuffle-btn">
                <i class="fas fa-random"></i> 乱序
            </button>
        </div>
        
        <p class="instructions">提示：点击卡片任意位置翻转，使用键盘← →切换，空格键翻转，R键随机</p>
        <p class="ipa-note">注：音标采用英式发音标准</p>
    </div>
    
    <!-- 生词本模态框 -->
    <div class="modal" id="favorites-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">我的生词本</h2>
                <button class="close-modal" id="close-modal">&times;</button>
            </div>
            <ul class="favorites-list" id="favorites-list">
                <!-- 收藏的单词会动态添加到这里 -->
            </ul>
            <p id="empty-favorites" style="text-align: center; padding: 20px; color: #888; display: none;">
                生词本为空，点击卡片上的心形图标收藏单词
            </p>
        </div>
    </div>

    <script>
        // 完整单词短语数据（从PDF中提取的所有内容）
        const wordList = [
            // Page 1 - 第一部分
            { word: "recording", meaning: "唱片", exampleEn: "I bought a new recording of my favorite band.", exampleCn: "我买了一张我最喜欢乐队的新唱片。", phonetic: "/rɪˈkɔːdɪŋ/", category: "noun", source: "PET词汇表" },
            { word: "review", meaning: "评价", exampleEn: "The film received positive reviews from critics.", exampleCn: "这部电影获得了评论家的积极评价。", phonetic: "/rɪˈvjuː/", category: "noun/verb", source: "PET词汇表" },
            { word: "traditional", meaning: "传统的", exampleEn: "We celebrate traditional festivals with our family.", exampleCn: "我们和家人一起庆祝传统节日。", phonetic: "/trəˈdɪʃənl/", category: "adj", source: "PET词汇表" },
            { word: "opera", meaning: "歌剧", exampleEn: "We went to see an Italian opera at the theatre.", exampleCn: "我们去剧院看了一场意大利歌剧。", phonetic: "/ˈɒprə/", category: "noun", source: "PET词汇表" },
            { word: "quiz", meaning: "小测", exampleEn: "We have a vocabulary quiz every Friday.", exampleCn: "我们每周五都有词汇小测验。", phonetic: "/kwɪz/", category: "noun", source: "PET词汇表" },
            { word: "international", meaning: "国际的", exampleEn: "She works for an international company.", exampleCn: "她在一家国际公司工作。", phonetic: "/ˌɪntəˈnæʃənl/", category: "adj", source: "PET词汇表" },
            { word: "link", meaning: "链接", exampleEn: "Click on this link to visit the website.", exampleCn: "点击此链接访问网站。", phonetic: "/lɪŋk/", category: "noun/verb", source: "PET词汇表" },
            { word: "article", meaning: "文章", exampleEn: "I read an interesting article about climate change.", exampleCn: "我读了一篇关于气候变化的有趣文章。", phonetic: "/ˈɑːtɪkl/", category: "noun", source: "PET词汇表" },
            { word: "wider audience", meaning: "更广泛的观众", exampleEn: "The film aims to attract a wider audience.", exampleCn: "这部电影旨在吸引更广泛的观众。", phonetic: "/ˈwaɪdər ˈɔːdiəns/", category: "phrase", source: "PET词汇表" },
            { word: "album", meaning: "专辑", exampleEn: "The band released their new album last month.", exampleCn: "这支乐队上个月发行了他们的新专辑。", phonetic: "/ˈælbəm/", category: "noun", source: "PET词汇表" },
            { word: "clips", meaning: "小短片", exampleEn: "I watched some funny clips on the internet.", exampleCn: "我在网上看了一些有趣的小短片。", phonetic: "/klɪps/", category: "noun", source: "PET词汇表" },
            { word: "discuss", meaning: "讨论", exampleEn: "Let's discuss the plan at the meeting.", exampleCn: "让我们在会议上讨论这个计划。", phonetic: "/dɪˈskʌs/", category: "verb", source: "PET词汇表" },
            { word: "relate to", meaning: "相关", exampleEn: "The story relates to my own experiences.", exampleCn: "这个故事与我自己的经历相关。", phonetic: "/rɪˈleɪt tuː/", category: "phrase", source: "PET词汇表" },
            { word: "give tips (advice)", meaning: "给建议", exampleEn: "The teacher gave us tips on how to study effectively.", exampleCn: "老师给了我们如何有效学习的建议。", phonetic: "/ɡɪv tɪps (ədˈvaɪs)/", category: "phrase", source: "PET词汇表" },
            
            // PET官方2阅读T2P2

            { word: "organizer", meaning: "组织者", exampleEn: "The event organizer did a great job.", exampleCn: "活动组织者做得很好。", phonetic: "/ˈɔːɡənaɪzə(r)/", category: "noun", source: "PET官方2阅读T2P2" },
            { word: "review", meaning: "评价", exampleEn: "I wrote a review of the restaurant online.", exampleCn: "我在网上写了这家餐厅的评价。", phonetic: "/rɪˈvjuː/", category: "noun/verb", source: "PET官方2阅读T2P2" },
            { word: "guest", meaning: "客人", exampleEn: "We had ten guests at our dinner party.", exampleCn: "我们的晚餐聚会有十位客人。", phonetic: "/ɡest/", category: "noun", source: "PET官方2阅读T2P2" },
            { word: "transport", meaning: "交通", exampleEn: "Public transport is convenient in the city.", exampleCn: "城市里的公共交通很方便。", phonetic: "/ˈtrænspɔːt/", category: "noun", source: "PET官方2阅读T2P2" },
            { word: "budget", meaning: "预算", exampleEn: "We need to stick to our budget.", exampleCn: "我们需要坚持我们的预算。", phonetic: "/ˈbʌdʒɪt/", category: "noun", source: "PET官方2阅读T2P2" },

            { word: "refreshment", meaning: "甜品,饮料", exampleEn: "Refreshments will be served after the meeting.", exampleCn: "会议后将提供茶点。", phonetic: "/rɪˈfreʃmənt/", category: "noun", source: "PET官方2阅读T2P2" },
            { word: "sail", meaning: "乘船", exampleEn: "We plan to sail around the island.", exampleCn: "我们计划乘船环岛游览。", phonetic: "/seɪl/", category: "verb", source: "PET官方2阅读T2P2" },

        // 应用状态
        let currentCardIndex = 0;
        let favorites = JSON.parse(localStorage.getItem('petFlashcardFavorites')) || [];
        let filteredWordList = [...wordList];
        let currentCategory = 'all';
        
        // DOM 元素
        const flashcard = document.getElementById('flashcard');
        const wordFront = document.getElementById('word-front');
        const phonetic = document.getElementById('phonetic');
        const meaningBack = document.getElementById('meaning-back');
        const exampleEn = document.getElementById('example-en');
        const exampleCn = document.getElementById('example-cn');
        const source = document.getElementById('source');

        const pronounceBtn = document.getElementById('pronounce-btn');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const flipBtn = document.getElementById('flip-btn');
        const randomBtn = document.getElementById('random-btn');
        const shuffleBtn = document.getElementById('shuffle-btn');
        const viewFavoritesBtn = document.getElementById('view-favorites-btn');
        const favoritesModal = document.getElementById('favorites-modal');
        const closeModal = document.getElementById('close-modal');

        const emptyFavorites = document.getElementById('empty-favorites');
        const currentCardSpan = document.getElementById('current-card');
        const totalCardsSpan = document.getElementById('total-cards');
        const favoritesCountSpan = document.getElementById('favorites-count');
        const cardNumber = document.getElementById('card-number');
        const searchInput = document.getElementById('search-input');
        const categoryButtons = document.querySelectorAll('.category-btn');
        const progressBar = document.getElementById('progress-bar');
        const progressPercent = document.getElementById('progress-percent');
        
        // 初始化
        function init() {
            totalCardsSpan.textContent = wordList.length;
            updateCard();
            updateFavoritesCount();
            updateProgress();
            
            // 键盘导航
            document.addEventListener('keydown', function(event) {
                if (event.key === 'ArrowLeft') {
                    prevCard();
                } else if (event.key === 'ArrowRight') {
                    nextCard();
                } else if (event.key === ' ' || event.key === 'Spacebar') {
                    flipCard();
                    event.preventDefault();
                } else if (event.key === 'r' || event.key === 'R') {
                    randomCard();
                }
            });
            
            // 点击卡片任意位置翻转
            flashcard.addEventListener('click', function(event) {
                // 如果不是点击按钮，则翻转卡片
                if (!event.target.closest('.favorite-btn') && !event.target.closest('.pronounce-btn')) {
                    flipCard();
                }
            });
            
            // 搜索功能
            searchInput.addEventListener('input', function() {
                filterCards();
            });
            
            // 分类过滤
            categoryButtons.forEach(button => {
                button.addEventListener('click', function() {
                    categoryButtons.forEach(btn => btn.classList.remove('active'));
                    this.classList.add('active');
                    currentCategory = this.getAttribute('data-category');
                    filterCards();
                });
            });
        }
        
        // 更新卡片内容
        function updateCard() {
            const currentWord = filteredWordList[currentCardIndex];
            wordFront.textContent = currentWord.word;
            phonetic.textContent = currentWord.phonetic;
            meaningBack.textContent = currentWord.meaning;
            exampleEn.textContent = currentWord.exampleEn;
            exampleCn.textContent = currentWord.exampleCn;
            source.textContent = `来源: ${currentWord.source}`;
            
            // 更新卡片编号
            currentCardSpan.textContent = currentCardIndex + 1;
            cardNumber.textContent = `${currentCardIndex + 1}/${filteredWordList.length}`;
            
            // 更新收藏按钮状态
            const originalIndex = wordList.findIndex(item => item.word === currentWord.word);
            const isFavorite = favorites.includes(originalIndex);
            favoriteBtn.classList.toggle('active', isFavorite);
            favoriteBtn.innerHTML = isFavorite ? '<i class="fas fa-heart"></i>' : '<i class="far fa-heart"></i>';
            
            // 确保卡片显示正面
            flashcard.classList.remove('flipped');
            
            // 更新进度
            updateProgress();
        }
        
        // 更新学习进度
        function updateProgress() {
            const total = wordList.length;
            const studied = favorites.length;
            const percent = Math.round((studied / total) * 100);
            progressBar.style.width = `${percent}%`;
            progressPercent.textContent = `${percent}%`;
        }
        
        // 翻转到下一张卡片
        function nextCard() {
            currentCardIndex = (currentCardIndex + 1) % filteredWordList.length;
            updateCard();
        }
        
        // 翻转到上一张卡片
        function prevCard() {
            currentCardIndex = (currentCardIndex - 1 + filteredWordList.length) % filteredWordList.length;
            updateCard();
        }
        
        // 随机卡片
        function randomCard() {
            if (filteredWordList.length === 0) return;
            
            let newIndex;
            do {
                newIndex = Math.floor(Math.random() * filteredWordList.length);
            } while (newIndex === currentCardIndex && filteredWordList.length > 1);
            
            currentCardIndex = newIndex;
            updateCard();
        }
        
        // 乱序播放
        function shuffleCards() {
            // 洗牌算法
            for (let i = filteredWordList.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [filteredWordList[i], filteredWordList[j]] = [filteredWordList[j], filteredWordList[i]];
            }
            currentCardIndex = 0;
            updateCard();
            alert('卡片已随机排序！');
        }
        
        // 翻转卡片
        function flipCard() {
            flashcard.classList.toggle('flipped');
        }
        
        // 发音功能
        function pronounceWord() {
            const currentWord = filteredWordList[currentCardIndex].word;
            // 简单的发音实现 - 使用Web Speech API
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(currentWord);
                utterance.lang = 'en-GB'; // 英式发音
                utterance.rate = 0.8;
                speechSynthesis.speak(utterance);
            } else {
                alert("您的浏览器不支持语音合成功能，请尝试使用Chrome或Edge浏览器。");
            }
        }
        
        // 切换收藏状态
        function toggleFavorite() {
            const currentWord = filteredWordList[currentCardIndex];
            const originalIndex = wordList.findIndex(item => item.word === currentWord.word);
            
            const index = favorites.indexOf(originalIndex);
            if (index === -1) {
                // 添加到收藏
                favorites.push(originalIndex);
                favoriteBtn.innerHTML = '<i class="fas fa-heart"></i>';
                favoriteBtn.classList.add('active');
            } else {
                // 从收藏中移除
                favorites.splice(index, 1);
                favoriteBtn.innerHTML = '<i class="far fa-heart"></i>';
                favoriteBtn.classList.remove('active');
            }
            
            // 保存到本地存储
            localStorage.setItem('petFlashcardFavorites', JSON.stringify(favorites));
            updateFavoritesCount();
            updateProgress();
        }
        
        // 更新收藏计数
        function updateFavoritesCount() {
            favoritesCountSpan.textContent = favorites.length;
        }
        
        // 过滤卡片
        function filterCards() {
            const searchTerm = searchInput.value.toLowerCase().trim();
            
            filteredWordList = wordList.filter(item => {
                // 分类过滤
                if (currentCategory !== 'all' && item.category !== currentCategory) {
                    return false;
                }
                
                // 搜索过滤
                if (searchTerm) {
                    return item.word.toLowerCase().includes(searchTerm) || 
                           item.meaning.toLowerCase().includes(searchTerm) ||
                           (item.exampleEn && item.exampleEn.toLowerCase().includes(searchTerm));
                }
                
                return true;
            });
            
            // 重置当前索引
            currentCardIndex = 0;
            
            // 更新总卡片数
            totalCardsSpan.textContent = filteredWordList.length;
            
            // 更新卡片
            if (filteredWordList.length > 0) {
                updateCard();
            } else {
                wordFront.textContent = "未找到匹配的单词";
                phonetic.textContent = "";
                meaningBack.textContent = "请尝试不同的搜索词";
                exampleEn.textContent = "No matching words found";
                exampleCn.textContent = "未找到匹配的单词";
                cardNumber.textContent = "0/0";
                currentCardSpan.textContent = "0";
                source.textContent = "";
            }
        }
        
        // 显示收藏夹
        function showFavorites() {
            // 清空列表
            favoritesList.innerHTML = '';
            
            if (favorites.length === 0) {
                emptyFavorites.style.display = 'block';
            } else {
                emptyFavorites.style.display = 'none';
                
                // 按收藏顺序显示
                favorites.forEach(favIndex => {
                    const word = wordList[favIndex];
                    const listItem = document.createElement('li');
                    listItem.className = 'favorite-item';
                    listItem.innerHTML = `
                        <div>
                            <div class="favorite-word">${word.word}</div>
                            <div class="favorite-meaning">${word.meaning}</div>
                            <div class="phonetic" style="font-size:0.9rem;margin-top:3px;">${word.phonetic}</div>
                        </div>
                        <div>
                            <button class="remove-btn" data-index="${favIndex}">移除</button>
                        </div>
                    `;
                    favoritesList.appendChild(listItem);
                });
                
                // 为移除按钮添加事件监听器
                document.querySelectorAll('.remove-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const indexToRemove = parseInt(this.getAttribute('data-index'));
                        removeFromFavorites(indexToRemove);
                    });
                });
            }
            
            favoritesModal.style.display = 'flex';
        }
        
        // 从收藏夹移除
        function removeFromFavorites(index) {
            const favIndex = favorites.indexOf(index);
            if (favIndex !== -1) {
                favorites.splice(favIndex, 1);
                localStorage.setItem('petFlashcardFavorites', JSON.stringify(favorites));
                updateFavoritesCount();
                updateProgress();
                
                // 如果当前卡片是收藏状态，更新按钮
                const currentWord = filteredWordList[currentCardIndex];
                if (currentWord && wordList[index].word === currentWord.word) {
                    favoriteBtn.innerHTML = '<i class="far fa-heart"></i>';
                    favoriteBtn.classList.remove('active');
                }
                
                // 重新显示收藏夹
                showFavorites();
            }
        }
        
        // 事件监听器
        favoriteBtn.addEventListener('click', function(event) {
            event.stopPropagation();
            toggleFavorite();
        });
        
        pronounceBtn.addEventListener('click', function(event) {
            event.stopPropagation();
            pronounceWord();
        });
        
        prevBtn.addEventListener('click', function(event) {
            event.stopPropagation();
            prevCard();
        });
        
        nextBtn.addEventListener('click', function(event) {
            event.stopPropagation();
            nextCard();
        });
        
        flipBtn.addEventListener('click', function(event) {
            event.stopPropagation();
            flipCard();
        });
        
        randomBtn.addEventListener('click', function(event) {
            event.stopPropagation();
            randomCard();
        });
        
        shuffleBtn.addEventListener('click', function(event) {
            event.stopPropagation();
            shuffleCards();
        });
        
        viewFavoritesBtn.addEventListener('click', showFavorites);
        
        closeModal.addEventListener('click', function() {
            favoritesModal.style.display = 'none';
        });
        
        // 点击模态框外部关闭
        window.addEventListener('click', function(event) {
            if (event.target === favoritesModal) {
                favoritesModal.style.display = 'none';
            }
        });
        
        // 初始化应用
        init();
    </script>
</body>
</html>
